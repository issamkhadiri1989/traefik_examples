services:
    traefik:
        image: traefik:latest
        command:
            - --api.insecure=true
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.web.address=:80
            - --serversTransport.forwardingTimeouts.idleConnTimeout=0s   # ← disables keep-alive pooling
        ports:
            - "80:80"
            - "8080:8080"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - proxy-net

networks:
    proxy-net:
        name: proxy-net
        external: true
