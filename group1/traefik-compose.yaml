services:
    nginx_webserver:
        build:
            context: ./infra/
            args:
                BUILD_ARGUMENT_ENV: dev
            dockerfile: ./nginx/Dockerfile
        restart: always
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.group1-frontend.rule=Host(`group1.ehei.localhost`)"
            - "traefik.http.routers.group1-frontend.entrypoints=web"
            - "traefik.http.routers.group1-frontend.service=group1-frontend"
            - "traefik.http.services.group1-frontend.loadbalancer.server.port=80"
            - "traefik.docker.network=proxy-net"
            - "traefik.http.middlewares.group1-headers.headers.customrequestheaders.X-Forwarded-Host=group1.ehei.localhost"
            - "traefik.http.routers.group1-frontend.middlewares=group1-headers"
        volumes:
            - ./project:/var/www/html:ro,cached
            - ./infra/nginx/conf.d:/etc/nginx/conf.d
        depends_on:
            - php
        networks:
            - proxy-net
            - internal_network
    php:
        build:
            context: ./infra/
            dockerfile: ./php/Dockerfile
        volumes:
            - ./project:/var/www/html:cached
            - ./infra/php/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf
            - ./infra/php/config/php.ini:/usr/local/etc/php/php.ini
            - ./infra/php/xdebug/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
        depends_on:
            - database
        networks:
            - internal_network
        expose:
            - "9000"
            - "9003"
    database:
        image: mysql
        platform: linux/x86_64
        command: --innodb-use-native-aio=${INNODB_USE_NATIVE_AIO:-1} --sql_mode=${SQL_MODE:-"ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"}
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: travel
        ports:
            - "33060:3306"
        volumes:
            - mysql_user:/var/lib/mysql:delegated
        networks:
            - internal_network
    phpmyadmin:
        image: phpmyadmin/phpmyadmin:5
        environment:
            PMA_HOST: database
        ports:
            - "9002:80"
        depends_on:
            - database
        networks:
            - internal_network
        volumes:
            - db_admin_data:/var/www/html
    mailcatcher:
        networks:
            - internal_network
        image: yappabe/mailcatcher
        ports:
            - 1025:1025
            - 1080:1080
volumes:
    db_admin_data:
    mysql:
    mysql_user:

networks:
    internal_network:
        name: group1_internal
    proxy-net:
        name: proxy-net
        external: true